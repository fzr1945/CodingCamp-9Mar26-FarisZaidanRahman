<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Task Add Test</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .test-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 400px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            padding: 20px;
            z-index: 1000;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .test-log {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            backdrop-filter: blur(10px);
        }
        .test-btn {
            padding: 12px 18px;
            margin: 5px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .test-btn:hover { 
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        .test-btn.success { background: rgba(40, 167, 69, 0.8); }
        .test-btn.danger { background: rgba(220, 53, 69, 0.8); }
        .status { 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 6px; 
            font-weight: bold;
            backdrop-filter: blur(10px);
        }
        .pass { background: rgba(40, 167, 69, 0.8); color: white; }
        .fail { background: rgba(220, 53, 69, 0.8); color: white; }
        .info { background: rgba(23, 162, 184, 0.8); color: white; }
        .warning { background: rgba(255, 193, 7, 0.8); color: #212529; }
        
        .quick-test {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            backdrop-filter: blur(10px);
        }
        .quick-test input {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            background: rgba(255,255,255,0.1);
            color: white;
            margin: 8px 0;
        }
        .quick-test input::placeholder {
            color: rgba(255,255,255,0.7);
        }
    </style>
</head>
<body>
    <div class="test-panel">
        <h4>🚀 Final Task Add Test</h4>
        
        <div>
            <button class="test-btn" onclick="runComprehensiveTest()">🔍 Run Full Test</button>
            <button class="test-btn success" onclick="testTaskAddDirectly()">✅ Test Direct Add</button>
            <button class="test-btn" onclick="testUIInteraction()">🖱️ Test UI</button>
            <button class="test-btn danger" onclick="clearLog()">🗑️ Clear</button>
        </div>
        
        <div id="test-status"></div>
        <div class="test-log" id="test-log">🎬 Final task add test ready...</div>
        
        <div class="quick-test">
            <h5 style="margin: 0 0 10px 0;">⚡ Quick Test</h5>
            <input type="text" id="quick-input" placeholder="Enter a test task">
            <button class="test-btn" onclick="quickAddTest()" style="width: 100%;">Add Task Now</button>
        </div>
    </div>

    <div class="container">
        <header class="header">
            <div class="greeting-section">
                <h1 id="greeting-message">Good morning, Faris</h1>
                <div class="time-date">
                    <span id="current-time">12:00 PM</span>
                    <span id="current-date">Monday, January 1, 2024</span>
                </div>
            </div>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">🌙</button>
        </header>

        <main class="main-content">
            <section class="tasks-section">
                <h2>Tasks</h2>
                <div class="task-input">
                    <input type="text" id="task-input" placeholder="Add a new task..." maxlength="500">
                    <button id="add-task" class="btn btn-primary">Add</button>
                </div>
                <div class="task-controls">
                    <button id="sort-tasks" class="btn btn-outline">Sort A-Z</button>
                </div>
                <ul id="task-list" class="task-list"></ul>
            </section>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        let testLog = [];
        let testResults = {
            passed: 0,
            failed: 0,
            total: 0
        };

        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = `[${timestamp}] ${message}`;
            testLog.push(logEntry);
            
            const logDiv = document.getElementById('test-log');
            logDiv.textContent = testLog.slice(-50).join('\n');
            logDiv.scrollTop = logDiv.scrollHeight;
            
            console.log(logEntry);
        }

        function setStatus(message, type = 'info') {
            const statusDiv = document.getElementById('test-status');
            statusDiv.innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        function runTest(name, testFn) {
            testResults.total++;
            try {
                const result = testFn();
                if (result) {
                    testResults.passed++;
                    log(`✅ ${name}: PASSED`);
                    return true;
                } else {
                    testResults.failed++;
                    log(`❌ ${name}: FAILED`);
                    return false;
                }
            } catch (error) {
                testResults.failed++;
                log(`❌ ${name}: ERROR - ${error.message}`);
                return false;
            }
        }

        function runComprehensiveTest() {
            log('🚀 Starting comprehensive task add test suite...');
            setStatus('Running comprehensive tests...', 'info');
            testResults = { passed: 0, failed: 0, total: 0 };
            
            // Test 1: Environment check
            runTest('Environment Check', () => {
                return document.getElementById('task-input') && 
                       document.getElementById('add-task') && 
                       document.getElementById('task-list');
            });
            
            // Test 2: TaskManager availability
            runTest('TaskManager Availability', () => {
                return typeof TaskManager !== 'undefined' && 
                       typeof TaskManager.addTask === 'function' &&
                       typeof TaskManager.getTasks === 'function';
            });
            
            // Test 3: NotificationSystem availability
            runTest('NotificationSystem Availability', () => {
                return typeof NotificationSystem !== 'undefined' && 
                       typeof NotificationSystem.showSuccess === 'function';
            });
            
            // Test 4: Storage functionality
            runTest('Storage Functionality', () => {
                try {
                    const testKey = 'test_' + Date.now();
                    localStorage.setItem(testKey, 'test');
                    const result = localStorage.getItem(testKey) === 'test';
                    localStorage.removeItem(testKey);
                    return result;
                } catch (e) {
                    return false;
                }
            });
            
            // Test 5: Direct TaskManager add
            runTest('Direct TaskManager Add', () => {
                const initialCount = TaskManager.getTasks().length;
                const testText = 'Test task ' + Date.now();
                const result = TaskManager.addTask(testText);
                
                if (result) {
                    const newCount = TaskManager.getTasks().length;
                    if (newCount === initialCount + 1) {
                        // Clean up
                        const tasks = TaskManager.getTasks();
                        const testTask = tasks.find(t => t.text === testText);
                        if (testTask) {
                            TaskManager.deleteTask(testTask.id);
                        }
                        return true;
                    }
                }
                return false;
            });
            
            // Test 6: UI interaction test
            setTimeout(() => {
                runTest('UI Interaction', () => {
                    const taskInput = document.getElementById('task-input');
                    const addButton = document.getElementById('add-task');
                    
                    if (!taskInput || !addButton) return false;
                    
                    const originalValue = taskInput.value;
                    const testText = 'UI test ' + Date.now();
                    taskInput.value = testText;
                    
                    // Simulate click
                    addButton.click();
                    
                    // Check if input was cleared (async check)
                    setTimeout(() => {
                        const success = taskInput.value === '';
                        taskInput.value = originalValue;
                        
                        if (success) {
                            testResults.passed++;
                            log('✅ UI Interaction: PASSED');
                        } else {
                            testResults.failed++;
                            log('❌ UI Interaction: FAILED');
                        }
                        
                        // Final results
                        setTimeout(() => {
                            const totalTests = testResults.total + 1; // +1 for UI test
                            log(`\n📊 Test Results: ${testResults.passed}/${totalTests} passed`);
                            
                            if (testResults.passed === totalTests) {
                                setStatus('🎉 All tests passed! Task add is working!', 'pass');
                            } else {
                                setStatus(`⚠️ ${testResults.failed} tests failed`, 'fail');
                            }
                        }, 100);
                    }, 200);
                    
                    return true; // Assume success for now, will be updated async
                });
            }, 100);
        }

        function testTaskAddDirectly() {
            log('🎯 Testing TaskManager.addTask directly...');
            
            if (typeof TaskManager === 'undefined') {
                log('❌ TaskManager not available');
                setStatus('TaskManager missing', 'fail');
                return;
            }
            
            const testText = 'Direct test ' + Date.now();
            log(`Adding task: "${testText}"`);
            
            try {
                const initialCount = TaskManager.getTasks().length;
                const result = TaskManager.addTask(testText);
                
                log(`Add result: ${result}`);
                
                if (result) {
                    const newCount = TaskManager.getTasks().length;
                    log(`Task count: ${initialCount} → ${newCount}`);
                    
                    if (newCount > initialCount) {
                        log('✅ Direct add successful');
                        setStatus('Direct add works perfectly!', 'pass');
                        
                        // Clean up
                        const tasks = TaskManager.getTasks();
                        const testTask = tasks.find(t => t.text === testText);
                        if (testTask) {
                            TaskManager.deleteTask(testTask.id);
                            log('🧹 Test task cleaned up');
                        }
                    } else {
                        log('❌ Task count not updated');
                        setStatus('Task not saved properly', 'fail');
                    }
                } else {
                    log('❌ TaskManager.addTask returned false');
                    setStatus('Add task returned false', 'fail');
                }
            } catch (error) {
                log(`❌ Error: ${error.message}`);
                setStatus('Add task error', 'fail');
            }
        }

        function testUIInteraction() {
            log('🖱️ Testing UI interaction...');
            
            const taskInput = document.getElementById('task-input');
            const addButton = document.getElementById('add-task');
            
            if (!taskInput || !addButton) {
                log('❌ UI elements not found');
                setStatus('UI elements missing', 'fail');
                return;
            }
            
            const originalValue = taskInput.value;
            const testText = 'UI interaction test ' + Date.now();
            
            log(`Setting input value: "${testText}"`);
            taskInput.value = testText;
            
            log('Clicking add button...');
            try {
                addButton.click();
                
                setTimeout(() => {
                    if (taskInput.value === '') {
                        log('✅ UI interaction successful (input cleared)');
                        setStatus('UI interaction works!', 'pass');
                    } else {
                        log('❌ UI interaction failed (input not cleared)');
                        setStatus('UI interaction failed', 'fail');
                    }
                    
                    // Restore original value
                    taskInput.value = originalValue;
                }, 300);
                
            } catch (error) {
                log(`❌ Button click error: ${error.message}`);
                setStatus('Button click failed', 'fail');
                taskInput.value = originalValue;
            }
        }

        function quickAddTest() {
            const quickInput = document.getElementById('quick-input');
            const text = quickInput.value.trim();
            
            if (!text) {
                log('❌ No text entered');
                return;
            }
            
            log(`⚡ Quick add test: "${text}"`);
            
            if (typeof TaskManager !== 'undefined' && TaskManager.addTask) {
                try {
                    const result = TaskManager.addTask(text);
                    if (result) {
                        quickInput.value = '';
                        log('✅ Quick add successful');
                        setStatus('Quick add worked!', 'pass');
                    } else {
                        log('❌ Quick add failed');
                        setStatus('Quick add failed', 'fail');
                    }
                } catch (error) {
                    log(`❌ Quick add error: ${error.message}`);
                    setStatus('Quick add error', 'fail');
                }
            } else {
                log('❌ TaskManager not available');
                setStatus('TaskManager unavailable', 'fail');
            }
        }

        function clearLog() {
            testLog = [];
            testResults = { passed: 0, failed: 0, total: 0 };
            document.getElementById('test-log').textContent = 'Log cleared...';
            document.getElementById('test-status').innerHTML = '';
        }

        // Enhanced console logging
        const originalConsoleLog = console.log;
        console.log = function(...args) {
            originalConsoleLog.apply(console, args);
            const message = args.join(' ');
            if (message.includes('Task') || message.includes('Add') || message.includes('Button') || 
                message.includes('click') || message.includes('Backup') || message.includes('Reinforc')) {
                log(`App: ${message}`);
            }
        };

        // Error capture
        window.addEventListener('error', function(e) {
            log(`❌ JS Error: ${e.message} at line ${e.lineno}`);
            setStatus('JavaScript error detected', 'fail');
        });

        // Wait for app initialization
        document.addEventListener('app:initialized', function() {
            log('✅ App initialization complete');
            setStatus('App ready for testing', 'info');
        });

        // Auto-start basic test
        setTimeout(() => {
            log('🎬 Auto-starting basic functionality test...');
            testTaskAddDirectly();
        }, 2000);
    </script>
</body>
</html>
