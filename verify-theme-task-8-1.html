<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 8.1 Verification - Theme Switching</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="greeting-section">
                <h1>Task 8.1 Verification</h1>
                <p>Testing theme switching functionality</p>
            </div>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                🌙
            </button>
        </header>

        <main class="main-content">
            <section class="timer-section">
                <h2>Theme Test Section</h2>
                <div class="timer-container">
                    <div class="timer-display">25:00</div>
                    <p>This section should change colors when theme is toggled.</p>
                    <div id="test-results">
                        <h3>Requirements Verification:</h3>
                        <ul id="results-list"></ul>
                    </div>
                </div>
            </section>

            <section class="tasks-section">
                <h2>Current Theme Status</h2>
                <p>Current theme: <span id="current-theme">light</span></p>
                <p>Stored theme: <span id="stored-theme">none</span></p>
                <button onclick="runVerification()" class="btn btn-primary">Run Verification</button>
            </section>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        function runVerification() {
            const results = [];
            
            // Test toggleTheme and applyTheme methods exist
            results.push({
                requirement: "7.1, 7.2, 7.3, 7.6",
                test: "toggleTheme() and applyTheme() methods implemented",
                passed: typeof ThemeManager !== 'undefined'
            });
            
            displayResults(results);
        }
        
        function displayResults(results) {
            const list = document.getElementById('results-list');
            list.innerHTML = '';
            
            results.forEach(result => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <strong>Req ${result.requirement}:</strong> ${result.test} 
                    <span style="color: ${result.passed ? 'green' : 'red'}">
                        ${result.passed ? '✅ PASS' : '❌ FAIL'}
                    </span>
                `;
                list.appendChild(li);
            });
        }
        
        // Run verification on load
        setTimeout(runVerification, 1000);
    </script>
</body>
</html>
