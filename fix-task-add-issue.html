<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix Task Add Issue</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .fix-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 450px;
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 8px;
            padding: 20px;
            z-index: 1000;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .fix-log {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 12px;
            margin: 10px 0;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 250px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .fix-btn {
            padding: 10px 15px;
            margin: 5px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        .fix-btn:hover { background: #218838; }
        .fix-btn.danger { background: #dc3545; }
        .fix-btn.danger:hover { background: #c82333; }
        .status { padding: 10px; margin: 8px 0; border-radius: 4px; font-weight: bold; }
        .pass { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .fail { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .warning { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
    </style>
</head>
<body>
    <div class="fix-panel">
        <h4>🔧 Task Add Issue Fixer</h4>
        
        <div>
            <button class="fix-btn" onclick="diagnoseIssue()">🔍 Diagnose Issue</button>
            <button class="fix-btn" onclick="applyFix()">🛠️ Apply Fix</button>
            <button class="fix-btn" onclick="testAfterFix()">✅ Test Fix</button>
            <button class="fix-btn danger" onclick="clearLog()">🗑️ Clear Log</button>
        </div>
        
        <div id="fix-status"></div>
        <div class="fix-log" id="fix-log">Ready to diagnose and fix task add issue...</div>
        
        <div style="margin-top: 15px; padding: 10px; background: #e9ecef; border-radius: 4px;">
            <h5 style="margin: 0 0 10px 0;">🧪 Test Task Add:</h5>
            <input type="text" id="test-input" placeholder="Enter test task" style="width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ced4da; border-radius: 4px;">
            <button class="fix-btn" onclick="testTaskAdd()" style="width: 100%;">Test Add Task</button>
        </div>
    </div>

    <div class="container">
        <header class="header">
            <div class="greeting-section">
                <h1 id="greeting-message">Good morning, Faris</h1>
                <div class="time-date">
                    <span id="current-time">12:00 PM</span>
                    <span id="current-date">Monday, January 1, 2024</span>
                </div>
            </div>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">🌙</button>
        </header>

        <main class="main-content">
            <section class="tasks-section">
                <h2>Tasks</h2>
                <div class="task-input">
                    <input type="text" id="task-input" placeholder="Add a new task..." maxlength="500">
                    <button id="add-task" class="btn btn-primary">Add</button>
                </div>
                <div class="task-controls">
                    <button id="sort-tasks" class="btn btn-outline">Sort A-Z</button>
                </div>
                <ul id="task-list" class="task-list"></ul>
            </section>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        let fixLog = [];
        let issuesFound = [];
        let fixesApplied = [];

        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = `[${timestamp}] ${message}`;
            fixLog.push(logEntry);
            
            const logDiv = document.getElementById('fix-log');
            logDiv.textContent = fixLog.slice(-40).join('\n');
            logDiv.scrollTop = logDiv.scrollHeight;
            
            console.log(logEntry);
        }

        function setStatus(message, type = 'info') {
            const statusDiv = document.getElementById('fix-status');
            statusDiv.innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        function diagnoseIssue() {
            log('🔍 Starting comprehensive diagnosis...');
            setStatus('Diagnosing issue...', 'info');
            issuesFound = [];
            
            // Check 1: DOM Elements
            log('Check 1: Verifying DOM elements exist');
            const taskInput = document.getElementById('task-input');
            const addButton = document.getElementById('add-task');
            const taskList = document.getElementById('task-list');
            
            if (!taskInput) {
                issuesFound.push('task-input element missing');
                log('❌ Task input element not found');
            } else {
                log('✅ Task input element found');
            }
            
            if (!addButton) {
                issuesFound.push('add-task button missing');
                log('❌ Add task button not found');
            } else {
                log('✅ Add task button found');
            }
            
            if (!taskList) {
                issuesFound.push('task-list element missing');
                log('❌ Task list element not found');
            } else {
                log('✅ Task list element found');
            }
            
            // Check 2: TaskManager availability
            log('Check 2: Verifying TaskManager availability');
            if (typeof TaskManager === 'undefined') {
                issuesFound.push('TaskManager not globally available');
                log('❌ TaskManager not available globally');
            } else {
                log('✅ TaskManager is available globally');
                
                // Check TaskManager methods
                const requiredMethods = ['addTask', 'init', 'getTasks'];
                requiredMethods.forEach(method => {
                    if (typeof TaskManager[method] !== 'function') {
                        issuesFound.push(`TaskManager.${method} method missing`);
                        log(`❌ TaskManager.${method} not available`);
                    } else {
                        log(`✅ TaskManager.${method} available`);
                    }
                });
            }
            
            // Check 3: Event listeners
            log('Check 3: Testing event listeners');
            if (addButton) {
                // Try to detect if event listeners are attached
                const hasClickHandler = addButton.onclick !== null;
                log(`Button onclick handler: ${hasClickHandler ? 'present' : 'not present'}`);
                
                // Test if clicking the button triggers any response
                const originalValue = taskInput ? taskInput.value : '';
                if (taskInput) {
                    taskInput.value = 'diagnostic test';
                    
                    // Simulate click and check for response
                    try {
                        addButton.click();
                        
                        setTimeout(() => {
                            if (taskInput.value === '') {
                                log('✅ Button click appears to work (input cleared)');
                            } else if (taskInput.value === 'diagnostic test') {
                                issuesFound.push('button click not working');
                                log('❌ Button click not working (input not cleared)');
                            }
                            taskInput.value = originalValue;
                        }, 100);
                        
                    } catch (error) {
                        issuesFound.push('button click error: ' + error.message);
                        log(`❌ Button click error: ${error.message}`);
                    }
                }
            }
            
            // Check 4: Storage functionality
            log('Check 4: Testing storage functionality');
            try {
                const testKey = 'diagnostic_test';
                localStorage.setItem(testKey, 'test');
                const retrieved = localStorage.getItem(testKey);
                localStorage.removeItem(testKey);
                
                if (retrieved === 'test') {
                    log('✅ LocalStorage working');
                } else {
                    issuesFound.push('localStorage not working properly');
                    log('❌ LocalStorage not working properly');
                }
            } catch (error) {
                issuesFound.push('localStorage error: ' + error.message);
                log(`❌ LocalStorage error: ${error.message}`);
            }
            
            // Check 5: NotificationSystem
            log('Check 5: Testing NotificationSystem');
            if (typeof NotificationSystem === 'undefined') {
                issuesFound.push('NotificationSystem not available');
                log('❌ NotificationSystem not available');
            } else {
                log('✅ NotificationSystem available');
            }
            
            // Summary
            setTimeout(() => {
                log(`\n📊 Diagnosis complete. Found ${issuesFound.length} issues:`);
                if (issuesFound.length === 0) {
                    log('✅ No issues found - task add should be working');
                    setStatus('No issues found', 'pass');
                } else {
                    issuesFound.forEach(issue => log(`  - ${issue}`));
                    setStatus(`Found ${issuesFound.length} issues`, 'fail');
                }
            }, 200);
        }

        function applyFix() {
            log('🛠️ Applying fixes for identified issues...');
            setStatus('Applying fixes...', 'info');
            fixesApplied = [];
            
            if (issuesFound.length === 0) {
                log('ℹ️ No issues identified to fix. Run diagnosis first.');
                setStatus('No issues to fix', 'info');
                return;
            }
            
            // Fix 1: Re-initialize TaskManager if needed
            if (issuesFound.some(issue => issue.includes('TaskManager'))) {
                log('Fix 1: Re-initializing TaskManager...');
                try {
                    if (typeof TaskManager !== 'undefined' && TaskManager.init) {
                        TaskManager.init();
                        fixesApplied.push('TaskManager re-initialized');
                        log('✅ TaskManager re-initialized');
                    }
                } catch (error) {
                    log(`❌ TaskManager re-initialization failed: ${error.message}`);
                }
            }
            
            // Fix 2: Re-attach event listeners if needed
            if (issuesFound.some(issue => issue.includes('button click'))) {
                log('Fix 2: Re-attaching event listeners...');
                try {
                    const addButton = document.getElementById('add-task');
                    const taskInput = document.getElementById('task-input');
                    
                    if (addButton && taskInput) {
                        // Remove existing listeners (if any)
                        const newButton = addButton.cloneNode(true);
                        addButton.parentNode.replaceChild(newButton, addButton);
                        
                        // Add fresh event listener
                        newButton.addEventListener('click', function() {
                            log('🖱️ Add button clicked (fixed listener)');
                            
                            const text = taskInput.value.trim();
                            if (!text) {
                                if (typeof NotificationSystem !== 'undefined') {
                                    NotificationSystem.showWarning('Please enter a task description.');
                                }
                                taskInput.focus();
                                return;
                            }
                            
                            if (typeof TaskManager !== 'undefined' && TaskManager.addTask) {
                                const success = TaskManager.addTask(text);
                                if (success) {
                                    taskInput.value = '';
                                    if (typeof NotificationSystem !== 'undefined') {
                                        NotificationSystem.showSuccess('Task added successfully!');
                                    }
                                    log('✅ Task added successfully via fixed listener');
                                } else {
                                    log('❌ TaskManager.addTask returned false');
                                }
                            } else {
                                log('❌ TaskManager not available for task add');
                            }
                        });
                        
                        // Also add Enter key listener
                        taskInput.addEventListener('keypress', function(e) {
                            if (e.key === 'Enter') {
                                newButton.click();
                            }
                        });
                        
                        fixesApplied.push('Event listeners re-attached');
                        log('✅ Event listeners re-attached');
                    }
                } catch (error) {
                    log(`❌ Event listener fix failed: ${error.message}`);
                }
            }
            
            // Fix 3: Initialize NotificationSystem if needed
            if (issuesFound.some(issue => issue.includes('NotificationSystem'))) {
                log('Fix 3: Initializing NotificationSystem...');
                try {
                    if (typeof NotificationSystem !== 'undefined' && NotificationSystem.init) {
                        NotificationSystem.init();
                        fixesApplied.push('NotificationSystem initialized');
                        log('✅ NotificationSystem initialized');
                    }
                } catch (error) {
                    log(`❌ NotificationSystem initialization failed: ${error.message}`);
                }
            }
            
            // Summary
            setTimeout(() => {
                log(`\n🔧 Fix application complete. Applied ${fixesApplied.length} fixes:`);
                if (fixesApplied.length === 0) {
                    log('ℹ️ No fixes could be applied');
                    setStatus('No fixes applied', 'warning');
                } else {
                    fixesApplied.forEach(fix => log(`  ✅ ${fix}`));
                    setStatus(`Applied ${fixesApplied.length} fixes`, 'pass');
                }
            }, 100);
        }

        function testAfterFix() {
            log('🧪 Testing task add functionality after fixes...');
            setStatus('Testing fixes...', 'info');
            
            const taskInput = document.getElementById('task-input');
            const addButton = document.getElementById('add-task');
            
            if (!taskInput || !addButton) {
                log('❌ Required elements still missing after fix');
                setStatus('Elements still missing', 'fail');
                return;
            }
            
            // Test 1: Direct TaskManager call
            log('Test 1: Direct TaskManager.addTask call');
            if (typeof TaskManager !== 'undefined' && TaskManager.addTask) {
                const testText = 'Fix test task ' + Date.now();
                try {
                    const result = TaskManager.addTask(testText);
                    if (result) {
                        log('✅ Direct TaskManager.addTask works');
                        
                        // Clean up test task
                        const tasks = TaskManager.getTasks();
                        const testTask = tasks.find(t => t.text === testText);
                        if (testTask) {
                            TaskManager.deleteTask(testTask.id);
                            log('🧹 Test task cleaned up');
                        }
                    } else {
                        log('❌ Direct TaskManager.addTask failed');
                    }
                } catch (error) {
                    log(`❌ Direct TaskManager.addTask error: ${error.message}`);
                }
            } else {
                log('❌ TaskManager.addTask not available');
            }
            
            // Test 2: UI interaction
            log('Test 2: UI button interaction');
            const uiTestText = 'UI fix test ' + Date.now();
            taskInput.value = uiTestText;
            
            try {
                addButton.click();
                
                setTimeout(() => {
                    if (taskInput.value === '') {
                        log('✅ UI interaction works (input cleared)');
                        setStatus('Task add functionality fixed!', 'pass');
                    } else {
                        log('❌ UI interaction still not working');
                        setStatus('UI interaction still broken', 'fail');
                    }
                }, 200);
                
            } catch (error) {
                log(`❌ UI interaction error: ${error.message}`);
                setStatus('UI interaction error', 'fail');
            }
        }

        function testTaskAdd() {
            const testInput = document.getElementById('test-input');
            const text = testInput.value.trim();
            
            if (!text) {
                log('❌ No text entered for test');
                return;
            }
            
            log(`🧪 Testing task add with: "${text}"`);
            
            if (typeof TaskManager !== 'undefined' && TaskManager.addTask) {
                try {
                    const result = TaskManager.addTask(text);
                    if (result) {
                        testInput.value = '';
                        log('✅ Test task add successful');
                        setStatus('Test successful', 'pass');
                    } else {
                        log('❌ Test task add failed');
                        setStatus('Test failed', 'fail');
                    }
                } catch (error) {
                    log(`❌ Test task add error: ${error.message}`);
                    setStatus('Test error', 'fail');
                }
            } else {
                log('❌ TaskManager not available for test');
                setStatus('TaskManager unavailable', 'fail');
            }
        }

        function clearLog() {
            fixLog = [];
            document.getElementById('fix-log').textContent = 'Log cleared...';
            document.getElementById('fix-status').innerHTML = '';
            issuesFound = [];
            fixesApplied = [];
        }

        // Capture app console logs
        const originalConsoleLog = console.log;
        console.log = function(...args) {
            originalConsoleLog.apply(console, args);
            const message = args.join(' ');
            if (message.includes('Task') || message.includes('Add') || message.includes('Button') || message.includes('click')) {
                log(`App: ${message}`);
            }
        };

        // Capture errors
        window.addEventListener('error', function(e) {
            log(`❌ JS Error: ${e.message} at line ${e.lineno}`);
            setStatus('JavaScript error detected', 'fail');
        });

        // Auto-start diagnosis when ready
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(() => {
                log('🎬 Fix tool ready');
                setStatus('Ready to diagnose and fix', 'info');
            }, 1000);
        });

        // Auto-run diagnosis after app loads
        setTimeout(() => {
            log('🚀 Auto-running diagnosis...');
            diagnoseIssue();
        }, 3000);
    </script>
</body>
</html>
