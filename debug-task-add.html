<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Task Add Issue</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .debug-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 350px;
            background: #f8f9fa;
            border: 2px solid #dc3545;
            border-radius: 8px;
            padding: 15px;
            z-index: 1000;
            max-height: 80vh;
            overflow-y: auto;
        }
        .debug-log {
            background: #fff;
            border: 1px solid #ddd;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
        .test-btn {
            padding: 5px 10px;
            margin: 2px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        .status {
            padding: 5px;
            margin: 5px 0;
            border-radius: 3px;
        }
        .pass { background: #d4edda; color: #155724; }
        .fail { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <div class="debug-panel">
        <h4>🔍 Task Add Debugger</h4>
        
        <button class="test-btn" onclick="testTaskAdd()">Test Task Add</button>
        <button class="test-btn" onclick="testDirectAdd()">Direct Add Test</button>
        <button class="test-btn" onclick="checkElements()">Check Elements</button>
        <button class="test-btn" onclick="clearLog()">Clear Log</button>
        
        <div id="status-display"></div>
        <div class="debug-log" id="debug-log">Ready to debug...</div>
        
        <h5>Manual Test:</h5>
        <input type="text" id="manual-input" placeholder="Test task text" style="width: 100%; margin: 5px 0;">
        <button class="test-btn" onclick="manualAdd()" style="width: 100%;">Manual Add</button>
    </div>

    <div class="container">
        <header class="header">
            <div class="greeting-section">
                <h1 id="greeting-message">Good morning, Faris</h1>
                <div class="time-date">
                    <span id="current-time">12:00 PM</span>
                    <span id="current-date">Monday, January 1, 2024</span>
                </div>
            </div>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">🌙</button>
        </header>

        <main class="main-content">
            <section class="tasks-section">
                <h2>Tasks</h2>
                <div class="task-input">
                    <input type="text" id="task-input" placeholder="Add a new task..." maxlength="500">
                    <button id="add-task" class="btn btn-primary">Add</button>
                </div>
                <div class="task-controls">
                    <button id="sort-tasks" class="btn btn-outline">Sort A-Z</button>
                </div>
                <ul id="task-list" class="task-list"></ul>
            </section>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        let debugLog = [];

        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = `[${timestamp}] ${message}`;
            debugLog.push(logEntry);
            
            const logDiv = document.getElementById('debug-log');
            logDiv.innerHTML = debugLog.slice(-20).join('<br>');
            logDiv.scrollTop = logDiv.scrollHeight;
            
            console.log(logEntry);
        }

        function updateStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status-display');
            statusDiv.innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        function checkElements() {
            log('🔍 Checking DOM elements...');
            
            const taskInput = document.getElementById('task-input');
            const addButton = document.getElementById('add-task');
            const taskList = document.getElementById('task-list');
            
            log(`Task input found: ${!!taskInput}`);
            log(`Add button found: ${!!addButton}`);
            log(`Task list found: ${!!taskList}`);
            
            if (addButton) {
                log(`Button onclick: ${!!addButton.onclick}`);
                log(`Button has listeners: ${addButton.addEventListener ? 'yes' : 'no'}`);
            }
            
            // Check if TaskManager is available
            if (typeof TaskManager !== 'undefined') {
                log('✅ TaskManager is available');
                log(`TaskManager methods: ${Object.keys(TaskManager).join(', ')}`);
            } else {
                log('❌ TaskManager not available');
            }
            
            // Check localStorage
            try {
                const tasks = localStorage.getItem('productivity_dashboard_tasks');
                log(`Current tasks in storage: ${tasks ? JSON.parse(tasks).length : 0}`);
            } catch (e) {
                log(`Storage error: ${e.message}`);
            }
        }

        function testTaskAdd() {
            log('🧪 Testing task add functionality...');
            
            const taskInput = document.getElementById('task-input');
            const addButton = document.getElementById('add-task');
            
            if (!taskInput || !addButton) {
                log('❌ Required elements not found');
                updateStatus('Elements missing', 'fail');
                return;
            }
            
            // Set test value
            const testText = 'Debug test task ' + Date.now();
            taskInput.value = testText;
            log(`Set input value: ${testText}`);
            
            // Try clicking the button
            try {
                log('Clicking add button...');
                addButton.click();
                log('✅ Button click executed');
                
                // Check if input was cleared (indicates success)
                setTimeout(() => {
                    if (taskInput.value === '') {
                        log('✅ Input cleared - task likely added');
                        updateStatus('Task add appears successful', 'pass');
                    } else {
                        log('❌ Input not cleared - task add may have failed');
                        updateStatus('Task add may have failed', 'fail');
                    }
                    
                    // Check storage
                    try {
                        const tasks = localStorage.getItem('productivity_dashboard_tasks');
                        if (tasks) {
                            const parsed = JSON.parse(tasks);
                            log(`Tasks in storage after add: ${parsed.length}`);
                            const lastTask = parsed[parsed.length - 1];
                            if (lastTask && lastTask.text === testText) {
                                log('✅ Task found in storage');
                                updateStatus('Task successfully saved', 'pass');
                            } else {
                                log('❌ Task not found in storage');
                                updateStatus('Task not saved properly', 'fail');
                            }
                        } else {
                            log('❌ No tasks in storage');
                            updateStatus('No tasks saved', 'fail');
                        }
                    } catch (e) {
                        log(`Storage check error: ${e.message}`);
                    }
                }, 500);
                
            } catch (error) {
                log(`❌ Button click error: ${error.message}`);
                updateStatus('Button click failed', 'fail');
            }
        }

        function testDirectAdd() {
            log('🔧 Testing direct TaskManager.addTask...');
            
            if (typeof TaskManager === 'undefined') {
                log('❌ TaskManager not available');
                updateStatus('TaskManager missing', 'fail');
                return;
            }
            
            const testText = 'Direct add test ' + Date.now();
            
            try {
                const result = TaskManager.addTask(testText);
                log(`Direct addTask result: ${result}`);
                
                if (result) {
                    log('✅ Direct add successful');
                    updateStatus('Direct add works', 'pass');
                } else {
                    log('❌ Direct add failed');
                    updateStatus('Direct add failed', 'fail');
                }
            } catch (error) {
                log(`❌ Direct add error: ${error.message}`);
                updateStatus('Direct add error', 'fail');
            }
        }

        function manualAdd() {
            log('👤 Manual add test...');
            
            const manualInput = document.getElementById('manual-input');
            const text = manualInput.value.trim();
            
            if (!text) {
                log('❌ No text entered');
                return;
            }
            
            log(`Manual add text: ${text}`);
            
            // Try direct TaskManager call
            if (typeof TaskManager !== 'undefined' && TaskManager.addTask) {
                try {
                    const result = TaskManager.addTask(text);
                    log(`Manual TaskManager.addTask result: ${result}`);
                    
                    if (result) {
                        manualInput.value = '';
                        log('✅ Manual add successful');
                        updateStatus('Manual add successful', 'pass');
                    } else {
                        log('❌ Manual add failed');
                        updateStatus('Manual add failed', 'fail');
                    }
                } catch (error) {
                    log(`❌ Manual add error: ${error.message}`);
                    updateStatus('Manual add error', 'fail');
                }
            } else {
                log('❌ TaskManager.addTask not available');
                updateStatus('TaskManager unavailable', 'fail');
            }
        }

        function clearLog() {
            debugLog = [];
            document.getElementById('debug-log').innerHTML = 'Log cleared...';
            document.getElementById('status-display').innerHTML = '';
        }

        // Override console.log to capture app logs
        const originalLog = console.log;
        console.log = function(...args) {
            originalLog.apply(console, args);
            log('Console: ' + args.join(' '));
        };

        // Capture errors
        window.addEventListener('error', function(e) {
            log(`❌ Error: ${e.message} at line ${e.lineno}`);
            updateStatus('JavaScript error detected', 'fail');
        });

        // Wait for app initialization
        document.addEventListener('app:initialized', function() {
            log('✅ App initialized');
            updateStatus('App ready', 'pass');
            setTimeout(checkElements, 500);
        });

        // Auto-start debugging
        setTimeout(() => {
            log('🚀 Debug session started');
            checkElements();
        }, 2000);
    </script>
</body>
</html>
