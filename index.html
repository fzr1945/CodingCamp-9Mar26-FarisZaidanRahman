<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <header class="header">
            <div class="greeting-section">
                <h1 id="greeting-message">Good morning, Faris</h1>
                <div class="time-date">
                    <span id="current-time">12:00 PM</span>
                    <span id="current-date">Monday, January 1, 2024</span>
                </div>
            </div>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                🌙
            </button>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Timer Section -->
            <section class="timer-section">
                <h2>Focus Timer</h2>
                <div class="timer-container">
                    <div class="timer-display" id="timer-display">25:00</div>
                    <div class="timer-controls">
                        <button id="timer-start" class="btn btn-primary">Start</button>
                        <button id="timer-stop" class="btn btn-secondary">Stop</button>
                        <button id="timer-reset" class="btn btn-secondary">Reset</button>
                    </div>
                    <div class="timer-mode">
                        <button id="mode-toggle" class="btn btn-outline">Switch to Pomodoro</button>
                    </div>
                </div>
            </section>

            <!-- Tasks Section -->
            <section class="tasks-section">
                <h2>Tasks</h2>
                <div class="task-input">
                    <input type="text" id="task-input" placeholder="Add a new task..." maxlength="500">
                    <button id="add-task" class="btn btn-primary">Add</button>
                </div>
                <div class="task-controls">
                    <button id="sort-tasks" class="btn btn-outline">Sort A-Z</button>
                </div>
                <ul id="task-list" class="task-list">
                    <!-- Tasks will be dynamically added here -->
                </ul>
            </section>

            <!-- Quick Links Section -->
            <section class="links-section">
                <h2>Quick Links</h2>
                <div class="link-input">
                    <input type="text" id="link-label" placeholder="Link name..." maxlength="50">
                    <input type="url" id="link-url" placeholder="https://example.com">
                    <button id="add-link" class="btn btn-primary">Add Link</button>
                </div>
                <div id="links-container" class="links-container">
                    <!-- Quick links will be dynamically added here -->
                </div>
            </section>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
